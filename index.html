<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>RepoDrive | GitHub File Portal</title>
    <!-- Font Awesome 6 for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #f4f7fc;
        font-family:
          "Segoe UI",
          Roboto,
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        padding: 1.5rem;
        color: #1e293b;
      }

      .container {
        width: 100%;
        max-width: 850px;
        background: white;
        border-radius: 2rem;
        box-shadow:
          0 20px 35px rgba(0, 0, 0, 0.05),
          0 10px 15px rgba(0, 0, 0, 0.03);
        padding: 1.8rem 1.5rem 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        margin: 1rem 0;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
        border-bottom: 2px solid #e9eef3;
        padding-bottom: 1.2rem;
      }

      .logo-area {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .logo-icon {
        background: #0f172a;
        color: white;
        width: 42px;
        height: 42px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        box-shadow: 0 6px 14px rgba(15, 23, 42, 0.2);
      }

      h1 {
        font-size: 1.8rem;
        font-weight: 650;
        letter-spacing: -0.3px;
        color: #0f172a;
        margin: 0;
        line-height: 1.2;
      }

      .subtitle {
        font-size: 0.9rem;
        color: #5b6e8c;
        margin-top: 2px;
      }

      .repo-badge {
        background: #f1f5f9;
        padding: 0.5rem 1.2rem;
        border-radius: 30px;
        font-size: 0.9rem;
        font-weight: 500;
        color: #1e3a5f;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        border: 1px solid #dce3eb;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        background: #f8fafd;
        padding: 0.8rem 1rem;
        border-radius: 20px;
        border: 1px solid #e2e8f0;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.4rem;
        font-size: 0.95rem;
        color: #334155;
        background: white;
        padding: 0.3rem 0.8rem;
        border-radius: 30px;
        border: 1px solid #dce3eb;
      }

      .breadcrumb i {
        color: #5f6b7a;
        font-size: 0.8rem;
        margin: 0 2px;
      }

      .breadcrumb span {
        cursor: pointer;
        color: #2563eb;
        font-weight: 500;
        transition: 0.2s;
        padding: 0.2rem 0.4rem;
        border-radius: 12px;
      }

      .breadcrumb span:hover {
        background: #eef4ff;
        text-decoration: underline;
      }

      .breadcrumb .current {
        color: #0f172a;
        font-weight: 600;
        cursor: default;
        text-decoration: none;
      }

      .breadcrumb .current:hover {
        background: transparent;
        text-decoration: none;
      }

      .search-wrapper {
        display: flex;
        align-items: center;
        background: white;
        border-radius: 30px;
        border: 1px solid #dce3eb;
        padding: 0.3rem 0.3rem 0.3rem 1rem;
        gap: 0.3rem;
      }

      .search-wrapper i {
        color: #7c8aa2;
        font-size: 0.9rem;
      }

      #searchInput {
        border: none;
        outline: none;
        background: transparent;
        font-size: 0.9rem;
        width: 150px;
        padding: 0.4rem 0;
      }

      #searchInput::placeholder {
        color: #9aa9bf;
      }

      .file-list {
        background: #ffffff;
        border-radius: 18px;
        border: 1px solid #edf2f9;
        min-height: 280px;
      }

      .list-header {
        display: grid;
        grid-template-columns: 2fr 1fr 0.8fr;
        padding: 0.8rem 1.2rem;
        font-weight: 600;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: #5e6f8d;
        border-bottom: 1px solid #eef3fa;
        background: #fafbfc;
        border-radius: 18px 18px 0 0;
      }

      .file-item {
        display: grid;
        grid-template-columns: 2fr 1fr 0.8fr;
        align-items: center;
        padding: 0.8rem 1.2rem;
        border-bottom: 1px solid #f1f5f9;
        transition: background 0.15s;
        cursor: pointer;
        border-radius: 0;
      }

      .file-item:last-child {
        border-bottom: none;
        border-radius: 0 0 18px 18px;
      }

      .file-item:hover {
        background: #f5f9ff;
      }

      .file-name {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        font-weight: 500;
        color: #1e293b;
        word-break: break-word;
      }

      .file-name i {
        font-size: 1.3rem;
        width: 28px;
        color: #3b4b62;
        text-align: center;
      }

      .file-name i.fa-folder {
        color: #eab308;
      }

      .file-name i.fa-file-image {
        color: #a855f7;
      }

      .file-name i.fa-file-pdf {
        color: #ef4444;
      }

      .file-name i.fa-file-alt,
      .file-name i.fa-file {
        color: #3b82f6;
      }

      .file-name i.fa-file-archive {
        color: #f59e0b;
      }

      .file-size {
        color: #475569;
        font-size: 0.9rem;
      }

      .download-action {
        text-align: right;
      }

      .download-btn {
        background: white;
        border: 1px solid #cbd5e1;
        padding: 0.4rem 1rem;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 500;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        background: #f8fafc;
      }

      .download-btn:hover {
        background: #0f172a;
        border-color: #0f172a;
        color: white;
      }

      .empty-message {
        text-align: center;
        padding: 3rem;
        color: #64748b;
        font-style: italic;
      }

      .link-generator {
        margin-top: 0.8rem;
        background: #f1f5f9;
        border-radius: 18px;
        padding: 1rem 1.2rem;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
        border: 1px solid #e2e8f0;
      }

      .link-label {
        font-weight: 600;
        font-size: 0.9rem;
        color: #0f172a;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .link-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.7rem;
      }

      #downloadLinkInput {
        flex: 1;
        padding: 0.7rem 1rem;
        border: 1px solid #d0d9e4;
        border-radius: 30px;
        font-size: 0.85rem;
        background: white;
        outline: none;
        min-width: 220px;
      }

      .copy-btn {
        background: #0f172a;
        color: white;
        border: none;
        padding: 0.7rem 1.4rem;
        border-radius: 30px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        transition: 0.2s;
      }

      .copy-btn:hover {
        background: #1e293b;
      }

      .footer-note {
        font-size: 0.8rem;
        color: #5f6b7a;
        text-align: center;
        margin-top: 0.5rem;
      }

      @media (max-width: 550px) {
        body {
          padding: 0.8rem;
        }
        .container {
          padding: 1.2rem;
        }
        .list-header,
        .file-item {
          grid-template-columns: 1.8fr 0.9fr 0.8fr;
          padding: 0.7rem 0.8rem;
        }
        .search-wrapper {
          width: 100%;
        }
        #searchInput {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo-area">
          <div class="logo-icon">
            <i class="fas fa-cloud-download-alt"></i>
          </div>
          <div>
            <h1>RepoDrive</h1>
            <div class="subtitle">GitHub file portal</div>
          </div>
        </div>
        <div class="repo-badge">
          <i class="fab fa-github"></i> <span id="repoDisplay">repo</span>
        </div>
      </header>

      <div class="controls">
        <div class="breadcrumb" id="breadcrumb">
          <span data-path=""><i class="fas fa-home"></i> root</span>
        </div>
        <div class="search-wrapper">
          <i class="fas fa-search"></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Filter files..."
            autocomplete="off"
          />
        </div>
      </div>

      <div class="file-list">
        <div class="list-header">
          <span>Name</span>
          <span>Size</span>
          <span></span>
        </div>
        <div id="fileContainer">
          <div class="empty-message">Loading files...</div>
        </div>
      </div>

      <div class="link-generator">
        <div class="link-label">
          <i class="fas fa-link"></i> Shareable download link
        </div>
        <div class="link-row">
          <input
            type="text"
            id="downloadLinkInput"
            placeholder="Click on a file to generate link"
            readonly
          />
          <button class="copy-btn" id="copyLinkBtn">
            <i class="far fa-copy"></i> Copy
          </button>
        </div>
        <div class="footer-note">
          <i class="fas fa-info-circle"></i> Direct download starts when link is
          opened.
        </div>
      </div>
    </div>

    <script>
      (function () {
        // ----- CONFIGURATION -----
        // GitHub repository details: adjust these for your repo.
        const REPO_OWNER = "thepestech"; // e.g., "torvalds"
        const REPO_NAME = "publicdrive"; // e.g., "linux"
        const BRANCH = "main"; // or "master"
        // Base URL for raw content (used for downloads)
        const RAW_BASE = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/`;

        // GitHub API endpoint to fetch contents
        const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;

        // ----- STATE -----
        let currentPath = ""; // e.g., "" or "docs/" or "assets/images/"
        let allItems = []; // current directory items
        let filteredItems = [];

        // DOM elements
        const breadcrumbDiv = document.getElementById("breadcrumb");
        const fileContainer = document.getElementById("fileContainer");
        const searchInput = document.getElementById("searchInput");
        const downloadLinkInput = document.getElementById("downloadLinkInput");
        const copyLinkBtn = document.getElementById("copyLinkBtn");
        const repoDisplaySpan = document.getElementById("repoDisplay");

        // Display repo info
        repoDisplaySpan.textContent = `${REPO_OWNER}/${REPO_NAME}`;

        // ----- UTILS -----
        function formatBytes(bytes) {
          if (bytes === 0 || !bytes) return "—";
          const k = 1024;
          const sizes = ["B", "KB", "MB", "GB"];
          const i = Math.floor(Math.log(bytes) / Math.log(k));
          return (
            parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + " " + sizes[i]
          );
        }

        function getIcon(item) {
          if (item.type === "dir") return "fa-folder";
          const name = item.name.toLowerCase();
          if (/\.(jpg|jpeg|png|gif|svg|webp|bmp|ico)$/.test(name))
            return "fa-file-image";
          if (/\.(pdf)$/.test(name)) return "fa-file-pdf";
          if (/\.(zip|rar|tar|gz|7z)$/.test(name)) return "fa-file-archive";
          if (/\.(mp4|mkv|webm|mov|avi)$/.test(name)) return "fa-file-video";
          if (/\.(mp3|wav|flac|ogg)$/.test(name)) return "fa-file-audio";
          if (/\.(txt|md|log|readme|license)$/.test(name)) return "fa-file-alt";
          if (/\.(js|html|css|py|java|cpp|ts|json|xml)$/.test(name))
            return "fa-file-code";
          return "fa-file";
        }

        // Build raw download URL for a file (not directory)
        function getRawDownloadUrl(filePath) {
          // filePath relative to repo root, e.g., "docs/readme.pdf"
          return RAW_BASE + filePath;
        }

        // Build direct shareable link that triggers download?
        // We use raw URL; browsers may display some files inline.
        // To force download we can append ?download=1 but raw doesn't support that.
        // Better: use a helper link that sets download attribute? But cross-origin restrictions.
        // We'll keep raw link; for many files (zip, pdf) it downloads.
        // For known types we could use a proxy? Not needed. We'll present the raw link.
        function getShareableDownloadLink(filePath, fileName) {
          // Direct raw URL: when clicked opens/downloads depending on browser.
          // We'll create a link that can be used in anchor with download attribute if same origin,
          // but raw.githubusercontent.com is cross-origin, so download attribute may be ignored.
          // Simplest: provide raw link; users can right-click save as.
          // To improve, we could use a blob approach but that fetches whole file.
          // Keep it straightforward.
          return getRawDownloadUrl(filePath);
        }

        // ----- RENDER -----
        function renderBreadcrumb() {
          breadcrumbDiv.innerHTML = "";
          // Home / root
          const rootSpan = document.createElement("span");
          rootSpan.innerHTML = '<i class="fas fa-home"></i> root';
          rootSpan.dataset.path = "";
          rootSpan.addEventListener("click", () => navigateTo(""));
          breadcrumbDiv.appendChild(rootSpan);

          if (currentPath === "") {
            rootSpan.classList.add("current");
            return;
          }

          const parts = currentPath.split("/").filter((p) => p);
          let accumulated = "";
          parts.forEach((part, index) => {
            const separator = document.createElement("i");
            separator.className = "fas fa-chevron-right";
            breadcrumbDiv.appendChild(separator);

            accumulated += part + "/";
            const span = document.createElement("span");
            span.textContent = part;
            span.dataset.path = accumulated;
            span.addEventListener("click", (e) => {
              const path = e.target.dataset.path;
              navigateTo(path || "");
            });
            breadcrumbDiv.appendChild(span);

            if (index === parts.length - 1) {
              span.classList.add("current");
            }
          });
        }

        function renderFileList(items) {
          fileContainer.innerHTML = "";
          if (!items || items.length === 0) {
            fileContainer.innerHTML =
              '<div class="empty-message"><i class="far fa-folder-open"></i> This folder is empty</div>';
            return;
          }

          items.forEach((item) => {
            const itemDiv = document.createElement("div");
            itemDiv.className = "file-item";

            // Name column
            const nameDiv = document.createElement("div");
            nameDiv.className = "file-name";
            const icon = document.createElement("i");
            icon.className = `fas ${getIcon(item)}`;
            nameDiv.appendChild(icon);
            const nameSpan = document.createElement("span");
            nameSpan.textContent = item.name;
            nameDiv.appendChild(nameSpan);

            // Size column
            const sizeDiv = document.createElement("div");
            sizeDiv.className = "file-size";
            sizeDiv.textContent =
              item.type === "dir" ? "—" : formatBytes(item.size);

            // Action column
            const actionDiv = document.createElement("div");
            actionDiv.className = "download-action";

            if (item.type === "dir") {
              const openBtn = document.createElement("button");
              openBtn.className = "download-btn";
              openBtn.innerHTML = '<i class="fas fa-folder-open"></i> Open';
              openBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                navigateTo(item.path);
              });
              actionDiv.appendChild(openBtn);
            } else {
              const downloadBtn = document.createElement("button");
              downloadBtn.className = "download-btn";
              downloadBtn.innerHTML = '<i class="fas fa-download"></i> DL';
              downloadBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                // Generate shareable link and also trigger download?
                const rawUrl = getShareableDownloadLink(item.path, item.name);
                downloadLinkInput.value = rawUrl;
                // Also attempt direct download by opening in new tab / same tab?
                // Better: create an invisible anchor and click it
                const a = document.createElement("a");
                a.href = rawUrl;
                a.download = item.name; // browser may ignore due to cross-origin
                a.target = "_blank";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
              });
              actionDiv.appendChild(downloadBtn);

              // Also clicking on the row generates the link (but not download)
              itemDiv.addEventListener("click", () => {
                const rawUrl = getShareableDownloadLink(item.path, item.name);
                downloadLinkInput.value = rawUrl;
              });
            }

            // If directory, clicking row navigates
            if (item.type === "dir") {
              itemDiv.addEventListener("click", () => navigateTo(item.path));
            }

            itemDiv.appendChild(nameDiv);
            itemDiv.appendChild(sizeDiv);
            itemDiv.appendChild(actionDiv);
            fileContainer.appendChild(itemDiv);
          });
        }

        function applySearchFilter() {
          const term = searchInput.value.trim().toLowerCase();
          if (term === "") {
            filteredItems = [...allItems];
          } else {
            filteredItems = allItems.filter((item) =>
              item.name.toLowerCase().includes(term),
            );
          }
          renderFileList(filteredItems);
        }

        // ----- DATA FETCHING -----
        async function fetchContents(path) {
          const url = API_BASE + (path ? path : "");
          try {
            const response = await fetch(url);
            if (!response.ok) {
              throw new Error(
                `GitHub API error: ${response.status} ${response.statusText}`,
              );
            }
            const data = await response.json();
            // Sort: directories first, then files, alphabetically
            const sorted = data.sort((a, b) => {
              if (a.type === b.type) {
                return a.name.localeCompare(b.name);
              }
              return a.type === "dir" ? -1 : 1;
            });
            return sorted;
          } catch (error) {
            console.error("Fetch error:", error);
            fileContainer.innerHTML = `<div class="empty-message"><i class="fas fa-exclamation-triangle"></i> Failed to load. Check console or repo settings.</div>`;
            return [];
          }
        }

        async function navigateTo(path) {
          // path should be relative directory path like "docs/" or ""
          currentPath = path;
          renderBreadcrumb();
          searchInput.value = "";
          fileContainer.innerHTML =
            '<div class="empty-message"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>';

          allItems = await fetchContents(path);
          filteredItems = [...allItems];
          renderFileList(filteredItems);

          // Clear download link input when navigating
          downloadLinkInput.value = "";
        }

        // ----- COPY FUNCTION -----
        async function copyToClipboard() {
          const text = downloadLinkInput.value.trim();
          if (!text) {
            alert("No link to copy. Click on a file first.");
            return;
          }
          try {
            await navigator.clipboard.writeText(text);
            // Visual feedback
            copyLinkBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => {
              copyLinkBtn.innerHTML = '<i class="far fa-copy"></i> Copy';
            }, 2000);
          } catch (err) {
            // Fallback
            downloadLinkInput.select();
            document.execCommand("copy");
            alert("Link copied to clipboard!");
          }
        }

        // ----- EVENT LISTENERS -----
        searchInput.addEventListener("input", applySearchFilter);

        copyLinkBtn.addEventListener("click", copyToClipboard);

        // Initial load
        navigateTo("");

        // Expose for potential debugging
      })();
    </script>
  </body>
</html>
